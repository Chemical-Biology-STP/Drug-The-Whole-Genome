{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-capsule fs-1 text-primary"></i>
          <h2 class="mt-2 mb-0">Create Account</h2>
          <p class="text-muted small">DrugCLIP Virtual Screening</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="you@crick.ac.uk" required autocomplete="email" />
            <div class="form-text">Only @crick.ac.uk addresses are permitted.</div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Min 8 characters" required minlength="8"
                   autocomplete="new-password" />
          </div>
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirm_password"
                   name="confirm_password" placeholder="Re-enter password" required
                   autocomplete="new-password" />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-person-plus me-1"></i>Register
            </button>
          </div>
        </form>
        <p class="text-center mt-3 mb-0 small text-muted">
          Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
