{% extends "base.html" %}

{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center py-5">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
        </div>

        <h1 class="display-4 fw-bold text-danger">{{ code }}</h1>

        <p class="lead mt-3">{{ message }}</p>

        {% if ref_id %}
        <div class="alert alert-secondary mt-4" role="alert">
            <small>
                <strong>Reference ID:</strong> <code>{{ ref_id }}</code>
            </small>
            <br>
            <small class="text-muted">
                Please include this reference ID if you contact support for assistance.
            </small>
        </div>
        {% endif %}

        <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary mt-4">
            <i class="bi bi-house-door me-1"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
